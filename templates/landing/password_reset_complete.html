{% extends 'Admin-dashboard/base.html' %}
{% block title %}تمت الاستعادة بنجاح{% endblock %}
{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background-color: #f8f9fa;">
    <div style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; direction: rtl;">
        <i class="fas fa-check-circle mb-3" style="font-size: 4rem; color: #68AF73;"></i>
        <h3 style="color: #2a756b; font-weight: bold;">تم بنجاح!</h3>
        <p class="text-muted mb-4">تم تعيين كلمة المرور الجديدة بنجاح. يمكنك الآن تسجيل الدخول باستخدام حسابك.</p>
        
        <div class="mt-2">
            <a href="{% url 'login_view' %}" class="btn w-100 py-3 fw-bold" style="background-color: #2a756b; color: white; border-radius: 8px;">تسجيل الدخول الآن</a>
        </div>
    </div>
</div>
{% endblock %}
