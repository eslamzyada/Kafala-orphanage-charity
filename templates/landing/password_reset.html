{% extends 'Admin-dashboard/base.html' %} {% block title %}استعادة كلمة المرور{% endblock %}
{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background-color: #f8f9fa;">
    <div style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; direction: rtl;">
        <i class="fas fa-lock text-warning mb-3" style="font-size: 3rem;"></i>
        <h3 style="color: #2a756b; font-weight: bold;">نسيت كلمة المرور؟</h3>
        <p class="text-muted mb-4">أدخل بريدك الإلكتروني المسجل لدينا وسنرسل لك رابطاً لتعيين كلمة مرور جديدة.</p>
        
        <form method="POST" style="text-align: right;">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-bold">البريد الإلكتروني</label>
                <input type="email" name="email" class="form-control p-3" placeholder="example@email.com" dir="ltr" required style="border-radius: 8px;">
            </div>
            <button type="submit" class="btn w-100 py-3 fw-bold" style="background-color: #2a756b; color: white; border-radius: 8px;">إرسال رابط الاستعادة</button>
        </form>
        <div class="mt-4">
            <a href="{% url 'login_view' %}" class="text-muted text-decoration-none fw-bold"><i class="fas fa-arrow-right me-1"></i> العودة لتسجيل الدخول</a>
        </div>
    </div>
</div>
{% endblock %}
