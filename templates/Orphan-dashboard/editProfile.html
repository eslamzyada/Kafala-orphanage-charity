{% extends 'Orphan-dashboard/base.html' %}
{% load static %}

{% block title %}تعديل الحساب{% endblock %}

{% block content %}
<div class="main-edit">
    <div class="inner-edit container">
        <p class="edit-title" style="color: var(--primary-color); font-weight: 800; border-bottom: 2px solid #eee; padding-bottom: 10px;"> تعديل ملفي الشخصي</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success text-center" style="font-weight: bold; border-radius: 8px;">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="image-upload">
                <label for="file-input" class="upload-circle" {% if orphan.image %}
                    style="background-image: url('{{ orphan.image.url }}'); background-size: cover; background-position: center;"
                    {% endif %}>
                    {% if not orphan.image %}
                    <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="camera icon">
                    {% endif %}
                    <span>انقر لتغيير الصورة</span>
                </label>
                <input id="file-input" name="profile_image" type="file" accept="image/*" hidden>
            </div>

            <div class="edit-inputs">
                
                <h5 style="color: #666; font-weight: bold; margin-top: 20px; margin-bottom: 15px;"><i class="fas fa-child"></i> بيانات اليتيم</h5>
                
                <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 250px;">
                        <label>الاسم الكامل (غير قابل للتعديل)</label>
                        <input type="text" class="form-control" value="{{ orphan.name }}" disabled>
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <label>العمر</label>
                        <input type="number" name="age" class="form-control" value="{% if orphan.age %}{{ orphan.age }}{% endif %}" min="0" max="18" required>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 250px;">
                        <label>الجنس</label>
                        <select name="gender" class="form-control" required>
                            <option value="Male" {% if is_male %} selected {% endif %}>ذكر</option>
                            <option value="Female" {% if is_female %} selected {% endif %}>أنثى</option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <label>الحالة الصحية العامة</label>
                        <select name="health_status" class="form-control" required>
                            <option value="ممتازة" {% if orphan.health_status == 'ممتازة' %} selected {% endif %}>ممتازة</option>
                            <option value="جيدة" {% if orphan.health_status == 'جيدة' %} selected {% endif %}>جيدة</option>
                            <option value="مريض" {% if orphan.health_status == 'مريض' %} selected {% endif %}>مريض</option>
                            <option value="ذوي احتياجات خاصة" {% if orphan.health_status == 'ذوي احتياجات خاصة' %} selected {% endif %}>ذوي احتياجات خاصة</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 250px;">
                        <label>المنطقة السكنية</label>
                        <input type="text" name="area" class="form-control" value="{% if orphan.area %}{{ orphan.area }}{% endif %}" required>
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <label>الحالة الاجتماعية</label>
                        <select name="social_status" class="form-control" required>
                            <option value="يتيم الأب" {% if orphan.social_status == 'يتيم الأب' %}selected{% endif %}>يتيم الأب </option>
                            <option value="يتيم لأبوين" {% if orphan.social_status == 'يتيم لأبوين' %}selected{% endif %}>يتيم لأبوين</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="form-control btn btn-primary" style="font-weight: bold; background-color: var(--primary-color); border: none; padding: 12px; margin-top: 10px;">حفظ التعديلات</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
