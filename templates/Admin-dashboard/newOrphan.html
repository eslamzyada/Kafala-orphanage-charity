{% extends 'Admin-dashboard/base.html' %}
{% load static %}

{% block content %}
<div class="form-container">
    <div class="title-form">إضافة يتيم جديد</div>
    {% if messages %}
        <div style="margin-bottom: 20px;">
            {% for message in messages %}
                <div style="padding: 10px; border-radius: 5px; margin-bottom: 10px; 
                            {% if message.tags == 'error' %} background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; 
                            {% else %} background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; {% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label style="font-weight: bold; color: #333;">اسم المستخدم (للدخول للنظام)</label>
            <input type="text" name="username" class="form-control" placeholder="مثال: ahmad_2026" required dir="ltr"
                style="background-color: #f8f9fa;">
            <small style="color: gray; font-size: 12px;">* استخدم أحرف إنجليزية وأرقام فقط. هذا الاسم سيستخدم لتسجيل
                الدخول.</small>
                
            <label style="font-weight: bold; color: #333;">الاسم الرباعي (الاسم القانوني)</label>
            <input type="text" name="name" class="form-control" placeholder="مثال: أحمد محمد علي محمود" required>
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: bold; color: #333;">كلمة المرور (للدخول للنظام)</label>
                <input type="password" name="password" class="form-control" placeholder="تعيين كلمة مرور لليتيم"
                    required dir="ltr" style="background-color: #f8f9fa;">
            </div>
            
            <div class="the-age">
                <input type="number" name="age" placeholder="العمر" required>
            </div>
            
            <div class="the-sex">
                <select name="gender" class="select-list-header" required>
                    <option value="" disabled selected hidden>الجنس</option>
                    <option value="Male">ذكر</option>
                    <option value="Female">أنثى</option>
                </select>
            </div>
            
            <div class="the-aria">
                <input type="text" name="area" placeholder="المنطقة" required>
            </div>
            
            <div class="the-health">
                <select name="health_status" class="select-list-header" required>
                    <option value="" disabled selected hidden>الحالة الصحية</option>
                    <option value="سليم">سليم</option>
                    <option value="غير سليم">غير سليم</option>
                </select>
            </div>
            
            <div class="the-social_stauts">
                <select name="social_status" class="select-list-header" required>
                    <option value="" disabled selected hidden>الحالة الإجتماعية</option>
                    <option value="يتيم الأب">يتيم الأب</option>
                    <option value="يتيم لأبوين">يتيم لأبوين</option>
                </select>
            </div>
            
            <div style="margin-top: 25px; padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; background-color: #fcfcfc;">
                <label style="font-weight: bold; color: #333; display: block; margin-bottom: 10px;">بيانات ولي الأمر / الوصي المسؤول</label>

                <div style="margin-bottom: 15px; display: flex; gap: 20px;">
                    <label style="cursor: pointer; font-weight: normal;">
                        <input type="radio" name="guardian_choice" value="existing" checked onclick="toggleGuardianFields()"> 
                        اختيار وصي مسجل مسبقاً
                    </label>
                    <label style="cursor: pointer; font-weight: normal;">
                        <input type="radio" name="guardian_choice" value="new" onclick="toggleGuardianFields()"> 
                        إضافة وصي جديد
                    </label>
                </div>

                <div id="existing_guardian_section">
                    <select name="guardian_id" id="guardian_id_select" class="select-list-header" style="margin-bottom: 0;" required>
                        <option value="" disabled selected hidden>-- اختر الوصي من القائمة --</option>
                        {% for g in guardians %}
                            <option value="{{ g.id }}">{{ g.name }} (هاتف: {{ g.phone }})</option>
                        {% empty %}
                            <option value="" disabled>لا يوجد أوصياء مسجلين! يرجى إضافة وصي جديد.</option>
                        {% endfor %}
                    </select>
                </div>

                <div id="new_guardian_section" style="display: none; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" name="new_g_name" placeholder="الاسم الرباعي للوصي" class="form-control" style="margin-bottom: 0;">
                    <input type="text" name="new_g_phone" placeholder="رقم هاتف الوصي" class="form-control" style="margin-bottom: 0;">
                    <input type="text" name="new_g_username" placeholder="اسم مستخدم للوصي (للدخول)" class="form-control" style="margin-bottom: 0;" dir="ltr">
                    <input type="password" name="new_g_password" placeholder="كلمة مرور الوصي" class="form-control" style="margin-bottom: 0;" dir="ltr">
                </div>
            </div>
            </div>

        <div class="file-upload-container">
            <label class="custom-file-upload">
                <input type="file" name="image" class="file-input" accept="image/*">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>رفع الصورة</span>
            </label>

            <div class="document-number">
                <label class="custom-file-upload">
                    <input type="file" name="document" class="file-input" accept=".pdf,.doc,.docx,.jpg,.png">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>رفع الوثيقة (اختياري)</span>
                </label>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="add-orphan">إضافة يتيم</button>
                <a href="{% url 'manage_orphans' %}" class="cancle-btn" style="text-decoration:none;"> إلغاء</a>
            </div>
        </div>
    </form>
</div>

<script>
    function toggleGuardianFields() {
        const choice = document.querySelector('input[name="guardian_choice"]:checked').value;
        const existingSection = document.getElementById('existing_guardian_section');
        const newSection = document.getElementById('new_guardian_section');
        const selectEl = document.getElementById('guardian_id_select');
        const newInputs = document.querySelectorAll('#new_guardian_section input');

        if (choice === 'new') {
            existingSection.style.display = 'none';
            newSection.style.display = 'grid'; 
            selectEl.removeAttribute('required'); 
            newInputs.forEach(input => input.setAttribute('required', 'true')); 
        } else {
            existingSection.style.display = 'block';
            newSection.style.display = 'none';
            selectEl.setAttribute('required', 'true'); 
            newInputs.forEach(input => {
                input.removeAttribute('required');
                input.value = ''; 
            });
        }
    }
    
    window.onload = toggleGuardianFields;
</script>
{% endblock %}
