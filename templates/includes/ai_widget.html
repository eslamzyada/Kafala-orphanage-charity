<style>
    /* Chat Widget Styling */
    #kafala-chat-widget {
        position: fixed;
        bottom: 30px;
        left: 30px; /* Floating on the bottom left for RTL layout */
        z-index: 9999;
        direction: rtl;
        font-family: 'Tajawal', sans-serif;
    }

    #kafala-chat-window {
        display: none;
        width: 350px;
        height: 500px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        border: 1px solid #eee;
        flex-direction: column;
        overflow: hidden;
        margin-bottom: 20px;
        transition: all 0.3s ease;
    }

    .chat-header {
        background: #2a756b; /* Kafala Primary Teal */
        color: white;
        padding: 15px 20px;
        font-weight: 800;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 1.1rem;
    }

    .chat-messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background: #F7FAFC;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .msg-bubble {
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.95rem;
        line-height: 1.6;
        max-width: 85%;
    }

    .msg-ai {
        background: white;
        border: 1px solid #eee;
        align-self: flex-start;
        color: #333;
        border-top-right-radius: 2px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }

    .msg-user {
        background: #D69E2E; /* Kafala Gold Accent */
        color: white;
        align-self: flex-end;
        border-top-left-radius: 2px;
        box-shadow: 0 2px 5px rgba(214, 158, 46, 0.2);
    }

    .chat-input-area {
        padding: 15px;
        border-top: 1px solid #eee;
        background: white;
        display: flex;
        gap: 10px;
        align-items: center;
    }

    #chat-input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
        font-family: inherit;
        transition: 0.3s;
    }

    #chat-input:focus {
        border-color: #2a756b;
    }

    .btn-send, .btn-mic {
        border: none;
        width: 45px;
        height: 45px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: 0.2s;
    }

    .btn-send {
        background: #2a756b;
        color: white;
    }

    .btn-send:hover { background: #1f5a52; transform: translateY(-2px); }

    .btn-mic {
        background: #f1f3f4;
        color: #dc3545;
    }

    .btn-mic:hover { background: #e2e6ea; }

    /* Floating Toggle Button */
    .chat-toggle-btn {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: #2a756b;
        color: white;
        border: none;
        box-shadow: 0 8px 25px rgba(42,117,107,0.4);
        font-size: 1.8rem;
        cursor: pointer;
        float: left;
        transition: transform 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .chat-toggle-btn:hover {
        transform: scale(1.05);
    }

    /* Voice Recording Animation */
    @keyframes pulse-record {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4); }
        70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
    }
</style>

<div id="kafala-chat-widget">
    
    <div id="kafala-chat-window">
        <div class="chat-header">
            <span><i class="fas fa-robot"></i> مساعد كفالة الذكي</span>
            <span onclick="toggleChat()" style="cursor: pointer; font-size: 1.5rem;">&times;</span>
        </div>
        
        <div id="chat-messages" class="chat-messages">
            <div class="msg-bubble msg-ai">
                مرحباً بك في منصة <strong>كفالة</strong>! أنا المساعد الذكي، مدعوم بالذكاء الاصطناعي.<br>يمكنك سؤالي كتابياً أو التحدث معي عبر الميكروفون. كيف يمكنني مساعدتك؟
            </div>
        </div>
        
        <div class="chat-input-area">
            <button id="mic-btn" class="btn-mic" onclick="startVoiceRecognition()" title="تحدث الآن">
                <i class="fas fa-microphone"></i>
            </button>

            <input type="text" id="chat-input" placeholder="اكتب سؤالك هنا...">
            
            <button class="btn-send" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <button class="chat-toggle-btn" onclick="toggleChat()">
        <i class="fas fa-comment-dots"></i>
    </button>
</div>

<script>
    // 1. Toggle Chat Window
    function toggleChat() {
        const chatWindow = document.getElementById('kafala-chat-window');
        chatWindow.style.display = chatWindow.style.display === 'none' || chatWindow.style.display === '' ? 'flex' : 'none';
    }

    // 2. Send Message to Django Backend
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const messageText = input.value.trim();
        if (!messageText) return;

        const messagesContainer = document.getElementById('chat-messages');
        
        // Add User Message to UI
        messagesContainer.innerHTML += `<div class="msg-bubble msg-user">${messageText}</div>`;
        input.value = '';
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        // Add Loading Indicator
        const loadingId = 'loading-' + Date.now();
        messagesContainer.innerHTML += `<div id="${loadingId}" class="msg-bubble msg-ai" style="color: #888;">جاري التفكير... <i class="fas fa-circle-notch fa-spin"></i></div>`;
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        // Send to Django
        try {
            const response = await fetch('/api/ai-assistant/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: messageText })
            });
            const data = await response.json();
            
            // Replace Loading with AI Reply
            document.getElementById(loadingId).remove();
            
            // Format line breaks for HTML
            const formattedReply = data.reply.replace(/\n/g, '<br>');
            
            messagesContainer.innerHTML += `<div class="msg-bubble msg-ai">${formattedReply}</div>`;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
        } catch (error) {
            document.getElementById(loadingId).innerHTML = '<span style="color: #dc3545;">عذراً، فقدنا الاتصال بالخادم.</span>';
        }
    }

    // Allow pressing "Enter" to send
    document.getElementById('chat-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });

    // 3. Web Speech API (Voice to Text)
    function startVoiceRecognition() {
        // Check if browser supports Speech Recognition
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!window.SpeechRecognition) {
            alert("عذراً، متصفحك لا يدعم خاصية التسجيل الصوتي. يرجى استخدام متصفح Google Chrome.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'ar-SA'; // Arabic Language
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        const micBtn = document.getElementById('mic-btn');
        const inputField = document.getElementById('chat-input');

        recognition.onstart = function() {
            // Visual feedback: Red pulse and change placeholder
            micBtn.style.background = '#ffe6e6';
            micBtn.style.animation = 'pulse-record 1.5s infinite';
            inputField.placeholder = "جاري الاستماع لرسالتك الصوتيّة...";
        };

        recognition.onresult = function(event) {
            const speechResult = event.results[0][0].transcript;
            inputField.value = speechResult; 
            sendMessage(); // Auto-send when speaking finishes
        };

        recognition.onerror = function(event) {
            inputField.placeholder = "لم أتمكن من سماعك بوضوح.";
            resetMicButton(micBtn, inputField);
        };

        recognition.onend = function() {
            resetMicButton(micBtn, inputField);
        };

        recognition.start();
    }

    function resetMicButton(btn, input) {
        btn.style.background = '#f1f3f4';
        btn.style.animation = 'none';
        input.placeholder = "اكتب سؤالك هنا...";
    }
</script>
